name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install package and development tools
        run: pip install -e ".[dev]"
      - name: Validate committed configurations
        shell: bash
        run: |
          set -euo pipefail
          for config in configs/baseline/*.yaml configs/ci/*.yaml; do
            python -m recoalign validate-config "${config}"
          done
      - name: Lint
        run: ruff check .
      - name: Test
        run: pytest
      - name: Validate complete CLI lifecycle
        shell: bash
        run: |
          set -euo pipefail
          run_dir=$(python -m recoalign init-run \
            --config configs/ci/synthetic.yaml \
            --output-root "${RUNNER_TEMP}/recoalign-runs" \
            --run-id ci-lifecycle)
          printf '{"accuracy": 100.0}\n' > "${RUNNER_TEMP}/metrics.json"
          python -m recoalign finalize-run "${run_dir}" \
            --metrics "${RUNNER_TEMP}/metrics.json" \
            --status complete
          python -m recoalign promote-run "${run_dir}" \
            --reviewed-by "GitHub Actions" \
            --notes "CPU-only provenance lifecycle check"
          python -m recoalign build-table \
            --results-root "${RUNNER_TEMP}/recoalign-runs" \
            --status reportable \
            --metrics accuracy \
            --output "${RUNNER_TEMP}/table.md"
          grep -q '100.0000' "${RUNNER_TEMP}/table.md"
