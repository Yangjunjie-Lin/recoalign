schema_version: 1
experiment:
  name: openclip_vit_b32_laion2b_mscoco_zero_shot
  seed: 42
  output_dir: outputs/openclip_vit_b32_laion2b_mscoco_zero_shot
  tags: [baseline, zero-shot, mscoco]
model:
  framework: open_clip
  name: ViT-B-32
  pretrained: laion2b_s34b_b79k
  manifest: manifests/checkpoints/openclip_vit_b32_laion2b_s34b_b79k.yaml
  checkpoint: null
  device: cuda
  image_size: 224
  precision: amp
  freeze_vision_encoder: true
  freeze_text_encoder: true
data:
  dataset: mscoco
  root: data/mscoco
  manifest: manifests/datasets/mscoco.yaml
  annotation_file: data/mscoco/annotations/test.jsonl
  image_root: data/mscoco/images
  split: test
evaluation:
  protocol: karpathy-5k-test
  image_batch_size: 32
  text_batch_size: 64
  ranking_batch_size: 128
  recall_at: [1, 5, 10]
  expected_num_images: 5000
  expected_num_captions: 25000
  normalize_embeddings: true
  cache_dir: data/cache/embeddings
  save_predictions: true
training:
  enabled: false
