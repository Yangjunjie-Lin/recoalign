schema_version: 1
experiment:
  name: openai_vit_b32_sugarcrepe_zero_shot
  seed: 42
  output_dir: outputs/openai_vit_b32_sugarcrepe_zero_shot
  tags: [baseline, zero-shot, sugarcrepe]
model:
  framework: open_clip
  name: ViT-B-32
  pretrained: openai
  manifest: manifests/checkpoints/openclip_vit_b32_openai.yaml
  checkpoint: null
  device: cuda
  image_size: 224
  precision: amp
  freeze_vision_encoder: true
  freeze_text_encoder: true
data:
  dataset: sugarcrepe
  root: data/sugarcrepe
  manifest: manifests/datasets/sugarcrepe.yaml
  annotation_file: data/sugarcrepe/annotations/test.jsonl
  image_root: data/sugarcrepe/images/val2017
  split: test
evaluation:
  protocol: official-neurips-2023-seven-category
  image_batch_size: 32
  text_batch_size: 64
  ranking_batch_size: 128
  recall_at: [1]
  required_categories: [add_att, add_obj, replace_att, replace_obj, replace_rel, swap_att, swap_obj]
  normalize_embeddings: true
  cache_dir: data/cache/embeddings
  save_predictions: true
training:
  enabled: false
