schema_version: 1
experiment:
  name: openclip_vit_b16_laion2b_flickr30k_zero_shot
  seed: 42
  output_dir: outputs/openclip_vit_b16_laion2b_flickr30k_zero_shot
  tags: [baseline, zero-shot, flickr30k]
model:
  framework: open_clip
  name: ViT-B-16
  pretrained: laion2b_s34b_b88k
  manifest: manifests/checkpoints/openclip_vit_b16_laion2b_s34b_b88k.yaml
  checkpoint: null
  device: cuda
  image_size: 224
  precision: amp
  freeze_vision_encoder: true
  freeze_text_encoder: true
data:
  dataset: flickr30k
  root: data/flickr30k
  manifest: manifests/datasets/flickr30k.yaml
  annotation_file: data/flickr30k/annotations/test.jsonl
  image_root: data/flickr30k/images
  split: test
evaluation:
  protocol: karpathy-1k-test
  image_batch_size: 16
  text_batch_size: 64
  ranking_batch_size: 128
  recall_at: [1, 5, 10]
  expected_num_images: 1000
  expected_num_captions: 5000
  normalize_embeddings: true
  cache_dir: data/cache/embeddings
  save_predictions: true
training:
  enabled: false
